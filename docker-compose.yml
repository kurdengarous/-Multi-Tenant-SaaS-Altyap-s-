version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saas
      POSTGRES_DB: saas
    ports: ["5434:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas -d saas"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://saas:saas@postgres:5432/saas
      JWT_SECRET: super-secret-change-me
      PORT: "4000"
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["9001:4000"]
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:9001/api
    depends_on: [backend]
    ports: ["9000:3000"]

volumes:
  pgdata:
